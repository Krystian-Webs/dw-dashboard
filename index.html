<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DirectWebs — SEO Dashboard</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg:#F4F4F2;--surface:#ffffff;--surface2:#F1EFE8;--border:#E4E2DC;
    --accent:#6c63ff;--accent2:#00b894;--text:#1f1f23;--text2:#6b6b76;
    --text3:#9b9ba6;--red:#e0445b;--yellow:#e0a82e;--green:#1d9e75;
    --side-bg:#13131f;--side-text:#cfcfe0;--side-text2:#7d7d99;--side-active:#6c63ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
  .sidebar{width:240px;background:var(--side-bg);display:flex;flex-direction:column;padding:18px 12px;gap:4px;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
  .sidebar-logo{display:flex;align-items:center;gap:10px;padding:0 8px 16px;color:#fff;font-weight:600;font-size:15px}
  .sidebar-logo span{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .sidebar-section-label{font-size:10px;color:var(--side-text2);text-transform:uppercase;letter-spacing:.08em;padding:14px 10px 6px}
  .site-icon{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--side-text);font-size:13px;transition:all .15s}
  .site-icon:hover{background:rgba(255,255,255,.05)}
  .site-icon.active{background:rgba(108,99,255,.18);color:#fff}
  .site-icon img{width:18px;height:18px;border-radius:4px;object-fit:cover;flex-shrink:0}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--side-text);font-size:13px;transition:all .15s}
  .nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
  .nav-item.active{background:var(--accent);color:#fff}
  .nav-item.airank{color:#b9b3ff}
  .sidebar-add{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;border:1px dashed rgba(255,255,255,.15);background:transparent;cursor:pointer;color:var(--side-text2);font-size:13px;margin-top:8px;width:100%;font-family:'Inter',sans-serif}
  .sidebar-add:hover{border-color:var(--accent);color:#fff}
  .main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
  .topbar{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;position:sticky;top:0;z-index:50}
  .topbar-title{font-size:15px;font-weight:600}
  .topbar-url{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2)}
  .topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
  .btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
  .btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(108,99,255,.35)}
  .btn-primary:hover{background:#574fe0}
  .btn-green{background:rgba(29,158,117,.1);color:var(--green);border:1px solid rgba(29,158,117,.35);font-weight:600}
  .btn-green:hover{background:rgba(29,158,117,.18)}
  .content{padding:24px 28px;flex:1}
  .tabs{display:none}
  .tab-panel{display:none}
  .tab-panel.active{display:block}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
  .stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .stat-value{font-size:24px;font-weight:600;font-family:'JetBrains Mono',monospace}
  .stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
  .card-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
  .kw-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
  .kw-row:last-child{border-bottom:none}
  .kw-phrase{font-size:12px;flex:1}
  .kw-pos{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;width:32px;text-align:center}
  .kw-bar-wrap{width:80px;height:4px;background:var(--surface2);border-radius:2px}
  .kw-bar{height:4px;border-radius:2px;background:var(--accent)}
  .kw-clicks{font-size:11px;color:var(--text3);width:50px;text-align:right}
  .post-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
  .post-row:last-child{border-bottom:none}
  .post-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .post-info{flex:1}
  .post-title{font-size:12px}
  .post-meta{font-size:11px;color:var(--text3);margin-top:2px}
  .post-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(29,158,117,.1);color:var(--green);border:1px solid rgba(29,158,117,.25)}
  .badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
  .badge-purple{background:rgba(108,99,255,.12);color:var(--accent);border:1px solid rgba(108,99,255,.25)}
  .seo-table{width:100%;border-collapse:collapse}
  .seo-table th{text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:0 12px 10px 0;border-bottom:1px solid var(--border)}
  .seo-table td{padding:10px 12px 10px 0;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle}
  .seo-table tr:last-child td{border-bottom:none}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--text3);gap:12px}
  .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:32px;color:var(--text3);font-size:13px;line-height:1.6}
  .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 64px);gap:16px;color:var(--text2);text-align:center}
  .welcome h2{font-size:22px;color:var(--text)}
  .welcome p{font-size:14px;max-width:340px;line-height:1.6}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:480px;transform:translateY(10px);transition:transform .2s}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:20px}
  .form-group{margin-bottom:14px}
  .form-label{font-size:11px;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.06em}
  .form-input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
  .form-input:focus{border-color:var(--accent)}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
  .gsc-connected{color:var(--green);font-size:12px;display:flex;align-items:center;gap:6px}
  .gsc-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
  .geo-row{display:flex;align-items:center;gap:10px;padding:6px 0}
  .geo-label{font-size:12px;width:160px;flex-shrink:0}
  .geo-bar-wrap{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
  .geo-bar{height:6px;border-radius:3px;background:var(--accent)}
  .geo-val{font-size:11px;color:var(--text3);width:60px;text-align:right;font-family:'JetBrains Mono',monospace}

  .menu-toggle{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);padding:4px 8px}
  .sidebar-overlay{display:none}

  @media (max-width: 860px) {
    .menu-toggle{display:block}
    .sidebar{transform:translateX(-100%);transition:transform .25s ease;width:240px;box-shadow:4px 0 24px rgba(0,0,0,.2)}
    .sidebar.open{transform:translateX(0)}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
    .sidebar-overlay.open{display:block}
    .main{margin-left:0}
    .topbar{padding:0 12px;gap:8px;flex-wrap:wrap;height:auto;min-height:56px;padding-top:8px;padding-bottom:8px}
    .topbar-title{font-size:14px}
    .topbar-url{display:none}
    .topbar-right{width:100%;flex-wrap:wrap;gap:6px;margin-left:0}
    .topbar-right .btn{flex:1;min-width:0;font-size:11px;padding:8px 6px;white-space:nowrap}
    .content{padding:14px}
    .stats-row{grid-template-columns:repeat(2,1fr);gap:8px}
    .grid2,.grid3{grid-template-columns:1fr;gap:12px}
    #ai-metrics-directwebs{grid-template-columns:repeat(2,1fr)!important}
    .stat-card{padding:12px}
    .stat-value{font-size:20px}
    .card{padding:14px}
    .seo-table{display:block;overflow-x:auto;white-space:nowrap}
    .geo-label{width:110px}
  }
</style>
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<body>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar(false)"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo"><span>DW</span> DirectWebs Panel</div>
  <div class="nav-item" id="nav-compare" onclick="showCompare()">📊 Porównanie</div>
  <div class="sidebar-section-label">Strony</div>
  <div id="sidebar-sites"></div>
  <button class="sidebar-add" onclick="openModal()">+ Dodaj stronę</button>
  <div id="sidebar-nav-wrap"></div>
</div>

<div class="main">
  <div class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div id="topbar-title" style="font-size:15px;font-weight:600">SEO Dashboard</div>
    <div id="topbar-url" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2)"></div>
    <div class="topbar-right" id="topbar-right" style="display:none">
      <div id="gsc-status"></div>
      <button id="gsc-btn" class="btn btn-ghost" onclick="handleGscBtn()">🔗 Połącz GSC</button>
      <button class="btn btn-ghost" onclick="runSeoAudit()">🔍 Audyt SEO</button>
      <button class="btn btn-primary" onclick="generatePost()">✍️ Generuj wpis</button>
    </div>
  </div>
  <div class="content" id="content">
    <div class="welcome">
      <div style="font-size:48px">🚀</div>
      <h2>Wybierz stronę z panelu bocznego</h2>
      <p>Kliknij ikonę strony po lewej lub dodaj nową stronę przyciskiem +</p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">➕ Dodaj stronę</div>
    <div class="form-group"><label class="form-label">Nazwa strony</label><input class="form-input" id="f-name" placeholder="np. ABM Market"></div>
    <div class="form-group"><label class="form-label">URL strony</label><input class="form-input" id="f-url" placeholder="https://example.pl"></div>
    <div class="form-group"><label class="form-label">GSC Site URL (np. sc-domain:example.pl)</label><input class="form-input" id="f-gsc" placeholder="sc-domain:example.pl"></div>
    <div class="form-group"><label class="form-label">WordPress Login</label><input class="form-input" id="f-wp-user" placeholder="admin"></div>
    <div class="form-group"><label class="form-label">WordPress Application Password</label><input class="form-input" id="f-wp-pass" type="password" placeholder="xxxx xxxx xxxx xxxx"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Anuluj</button>
      <button class="btn btn-primary" onclick="saveSite()">Dodaj stronę</button>
    </div>
  </div>
</div>

<script>
const GSC_CLIENT_ID = '880754963463-fd93unrpgud1hmjm8n3q1d5de9uocdbn.apps.googleusercontent.com';
const GSC_SCOPE = 'https://www.googleapis.com/auth/webmasters.readonly';

// ── SITES ──────────────────────────────────────────
let sites = JSON.parse(localStorage.getItem('dw_sites2') || 'null') || [
  {id:'directwebs', name:'DirectWebs', url:'https://directwebs.pl', gscSite:'sc-domain:directwebs.pl', wpUrl:'https://directwebs.pl', wpUser:'', wpPass:''},
  {id:'abmmarket',  name:'ABM Market', url:'https://abmmarket.pl',  gscSite:'sc-domain:abmmarket.pl',  wpUrl:'https://abmmarket.pl',  wpUser:'', wpPass:''},
  {id:'wazakotlina',name:'Waża Kotlina',url:'https://wazakotlina.pl',gscSite:'sc-domain:wazakotlina.pl',wpUrl:'https://wazakotlina.pl',wpUser:'', wpPass:''},
];
let activeSite = null;

// ── GSC TOKEN per site ──────────────────────────────
function getToken(siteId) {
  const t = localStorage.getItem(`gsc_token_${siteId}`);
  const e = parseInt(localStorage.getItem(`gsc_expiry_${siteId}`) || '0');
  if (t && Date.now() < e) return t;
  return null;
}
function setToken(siteId, token, expiresIn) {
  localStorage.setItem(`gsc_token_${siteId}`, token);
  localStorage.setItem(`gsc_expiry_${siteId}`, Date.now() + expiresIn * 1000);
}
function clearToken(siteId) {
  localStorage.removeItem(`gsc_token_${siteId}`);
  localStorage.removeItem(`gsc_expiry_${siteId}`);
}

// ── RENDER SIDEBAR ─────────────────────────────────
const NAV_ITEMS = [
  {id:'overview', icon:'📊', label:'Przegląd'},
  {id:'seo', icon:'🔍', label:'SEO stron'},
  {id:'keywords', icon:'🎯', label:'Frazy kluczowe'},
  {id:'posts', icon:'📝', label:'Wpisy'},
  {id:'settings', icon:'⚙️', label:'Ustawienia'},
];

function renderSidebar() {
  document.getElementById('nav-compare')?.classList.remove('active');
  const sitesEl = document.getElementById('sidebar-sites');
  sitesEl.innerHTML = '';
  sites.forEach(site => {
    const el = document.createElement('div');
    el.className = 'site-icon' + (activeSite?.id === site.id ? ' active' : '');
    const domain = new URL(site.url).hostname;
    el.innerHTML = `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64"><span>${site.name}</span>`;
    el.onclick = () => selectSite(site);
    sitesEl.appendChild(el);
  });
  renderSidebarNav();
}

function renderSidebarNav() {
  const navWrap = document.getElementById('sidebar-nav-wrap');
  if (!activeSite) { navWrap.innerHTML = ''; return; }
  let items = [...NAV_ITEMS];
  if (activeSite.id === 'directwebs') items.push({id:'airank', icon:'🤖', label:'AI & Ranking', cls:'airank'});
  navWrap.innerHTML = `<div class="sidebar-section-label">${activeSite.name}</div>` +
    items.map(it => `<div class="nav-item ${it.cls||''} ${activeTab===it.id?'active':''}" onclick="switchTab('${it.id}', this)">${it.icon} ${it.label}</div>`).join('');
}

// ── SELECT SITE ────────────────────────────────────
let activeTab = 'overview';
function selectSite(site) {
  activeSite = site;
  activeTab = 'overview';
  renderSidebar();
  const domain = new URL(site.url).hostname;
  document.getElementById('topbar-title').innerHTML = `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=32" style="width:20px;height:20px;border-radius:4px;vertical-align:middle;margin-right:8px">${site.name}`;
  document.getElementById('topbar-url').textContent = site.url;
  document.getElementById('topbar-right').style.display = 'flex';
  updateGscStatus(site);
  renderProfile(site);
  if (site.wpUser && site.wpPass) { loadWpData(site); loadSeoStatus(site); }
  let token = getToken(site.id);
  if (token) {
    loadGscData(site, token);
    if (site.id === 'directwebs') { loadFullRanking(site, token); loadAiVisibility(site); }
    loadGeoData(site, token);
  } else if (localStorage.getItem(`gsc_connected_${site.id}`) === '1') {
    silentReconnectGSC(site);
  }
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const panel = document.getElementById('tab-'+activeTab);
  if (panel) panel.classList.add('active');
  if (window.innerWidth <= 860) toggleSidebar(false);
}

// ── GSC STATUS ─────────────────────────────────────
function updateGscStatus(site) {
  const token = getToken(site.id);
  const statusEl = document.getElementById('gsc-status');
  const btnEl = document.getElementById('gsc-btn');
  if (token) {
    statusEl.innerHTML = '<span class="gsc-connected"><span class="gsc-dot"></span>GSC połączone</span>';
    btnEl.textContent = '🔓 Rozłącz GSC';
    btnEl.className = 'btn btn-green';
  } else {
    statusEl.innerHTML = '';
    btnEl.textContent = '🔗 Połącz GSC';
    btnEl.className = 'btn btn-ghost';
  }
}

function handleGscBtn() {
  if (!activeSite) return;
  const token = getToken(activeSite.id);
  if (token) {
    clearToken(activeSite.id);
    localStorage.removeItem(`gsc_connected_${activeSite.id}`);
    updateGscStatus(activeSite);
    renderProfile(activeSite);
    switchTab(activeTab, document.querySelector('.nav-item.active'));
  } else {
    loginGSC(activeSite);
  }
}

function loginGSC(site) {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GSC_CLIENT_ID,
    scope: GSC_SCOPE,
    callback: (resp) => {
      if (resp.access_token) {
        setToken(site.id, resp.access_token, resp.expires_in || 3600);
        localStorage.setItem(`gsc_connected_${site.id}`, '1');
        updateGscStatus(site);
        loadGscData(site, resp.access_token);
        loadGeoData(site, resp.access_token);
        if (site.id === 'directwebs') { loadFullRanking(site, resp.access_token); loadAiVisibility(site); }
      }
    }
  });
  client.requestAccessToken();
}

// ── SILENT RECONNECT — uzytkownik juz raz zezwolil, odswiez token bez ekranu logowania
function silentReconnectGSC(site) {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GSC_CLIENT_ID,
    scope: GSC_SCOPE,
    callback: (resp) => {
      if (resp.access_token) {
        setToken(site.id, resp.access_token, resp.expires_in || 3600);
        if (activeSite?.id === site.id) {
          updateGscStatus(site);
          loadGscData(site, resp.access_token);
          loadGeoData(site, resp.access_token);
          if (site.id === 'directwebs') { loadFullRanking(site, resp.access_token); loadAiVisibility(site); }
        }
      }
    }
  });
  client.requestAccessToken({prompt: ''});
}

// ── LOAD GSC DATA ──────────────────────────────────
async function loadGscData(site, token) {
  const end = new Date().toISOString().split('T')[0];
  const start = new Date(Date.now()-30*24*60*60*1000).toISOString().split('T')[0];
  try {
    const res = await fetch(`https://searchconsole.googleapis.com/webmasters/v3/sites/${encodeURIComponent(site.gscSite)}/searchAnalytics/query`, {
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({startDate:start,endDate:end,dimensions:['query'],rowLimit:20})
    });
    if (!res.ok) { clearToken(site.id); updateGscStatus(site); return; }
    const data = await res.json();
    const rows = data.rows || [];
    let clicks=0, impr=0, posSum=0;
    rows.forEach(r=>{clicks+=r.clicks;impr+=r.impressions;posSum+=r.position});
    const avgPos = rows.length ? (posSum/rows.length).toFixed(1) : '—';
    // update cards
    const cards = document.querySelectorAll('.stat-card .stat-value');
    if(cards[0]) cards[0].textContent = clicks.toLocaleString('pl-PL');
    if(cards[1]) cards[1].textContent = impr.toLocaleString('pl-PL');
    if(cards[2]) cards[2].textContent = avgPos;
    siteCache[site.id] = {...(siteCache[site.id]||{}), clicks, impr, avgPos};

    // pelna lista do top3/top10 (do porownania)
    const resAll = await fetch(`https://searchconsole.googleapis.com/webmasters/v3/sites/${encodeURIComponent(site.gscSite)}/searchAnalytics/query`, {
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({startDate:start,endDate:end,dimensions:['query'],rowLimit:250})
    });
    if (resAll.ok) {
      const allData = await resAll.json();
      const allRows = allData.rows || [];
      siteCache[site.id].top3 = allRows.filter(r=>r.position<=3).length;
      siteCache[site.id].top10 = allRows.filter(r=>r.position<=10).length;
      siteCache[site.id].totalKw = allRows.length;
    }

    // update keywords panel
    renderKeywordsData(site, rows);
    loadOverviewTrend(site, token);
  } catch(e) { console.error(e); }
}

// ── OVERVIEW TREND (clicks per day, slim chart) ────

// ── FULL RANKING + TREND + FORECAST (DirectWebs only) ─
let rankChartInstance = null;
let forecastChartInstance = null;

async function loadFullRanking(site, token) {
  const el = document.getElementById(`ranking-full-${site.id}`);
  const trendEl = document.getElementById(`rank-trend-${site.id}`);
  const summaryEl = document.getElementById(`rank-summary-${site.id}`);
  const forecastEl = document.getElementById(`forecast-${site.id}`);
  if (!el) return;
  if (!token) { el.innerHTML = '<div class="empty">Połącz Google Search Console przyciskiem w górnym pasku</div>'; return; }

  const periodSel = document.getElementById(`rank-period-${site.id}`);
  const days = periodSel ? parseInt(periodSel.value) : 90;

  el.innerHTML = '<div class="loading"><div class="spinner"></div><span>Pobieranie danych...</span></div>';
  if (trendEl) trendEl.innerHTML = '<div class="loading"><div class="spinner"></div><span>Ładowanie wykresu...</span></div>';
  if (forecastEl) forecastEl.innerHTML = '<div class="loading"><div class="spinner"></div><span>Liczenie prognozy...</span></div>';

  const end = new Date().toISOString().split('T')[0];
  const start = new Date(Date.now()-days*24*60*60*1000).toISOString().split('T')[0];

  try {
    // 1) Lista fraz (zagregowane)
    const resQuery = await fetch(`https://searchconsole.googleapis.com/webmasters/v3/sites/${encodeURIComponent(site.gscSite)}/searchAnalytics/query`, {
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({startDate:start,endDate:end,dimensions:['query'],rowLimit:250})
    });
    if (!resQuery.ok) { el.innerHTML = '<div class="empty">Błąd pobierania danych GSC (zaloguj się ponownie)</div>'; return; }
    const dataQuery = await resQuery.json();
    let rows = dataQuery.rows || [];
    rows.sort((a,b)=>a.position-b.position);

    const top10 = rows.filter(r=>r.position<=10).length;
    const top3  = rows.filter(r=>r.position<=3).length;

    document.getElementById(`m-top3-${site.id}`).textContent = top3;
    document.getElementById(`m-top10-${site.id}`).textContent = top10;

    // 2) Trend po dniach (srednia pozycja)
    const resDate = await fetch(`https://searchconsole.googleapis.com/webmasters/v3/sites/${encodeURIComponent(site.gscSite)}/searchAnalytics/query`, {
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({startDate:start,endDate:end,dimensions:['date'],rowLimit:days+5})
    });
    const dataDate = resDate.ok ? await resDate.json() : {rows:[]};
    const dateRows = (dataDate.rows||[]).sort((a,b)=>a.keys[0]<b.keys[0]?-1:1);

    // Render trend chart
    if (trendEl) {
      trendEl.innerHTML = `<canvas id="rankCanvas-${site.id}" role="img" aria-label="Wykres trendu sredniej pozycji w Google"></canvas>`;
      const ctx = document.getElementById(`rankCanvas-${site.id}`);
      if (rankChartInstance) rankChartInstance.destroy();
      rankChartInstance = new Chart(ctx, {
        type:'line',
        data:{
          labels: dateRows.map(r=>r.keys[0].slice(5)),
          datasets:[{
            label:'Średnia pozycja',
            data: dateRows.map(r=>Math.round(r.position*10)/10),
            borderColor:'#6c63ff',
            backgroundColor:'rgba(108,99,255,0.08)',
            fill:true, tension:0.3, pointRadius:0, borderWidth:1.5
          }]
        },
        options:{
          responsive:true, maintainAspectRatio:false,
          scales:{ y:{ reverse:true, title:{display:true,text:'Pozycja (niżej = lepiej)'} }, x:{ ticks:{ maxTicksLimit:10 } } },
          plugins:{ legend:{ display:false } }
        }
      });
    }

    if (summaryEl) {
      summaryEl.innerHTML = `<div style="display:flex;gap:16px;font-size:12px;padding-top:8px;border-top:1px solid var(--border)">
        <span style="color:var(--green)">🥇 ${top3} fraz w TOP 3</span>
        <span style="color:var(--yellow)">⭐ ${top10} fraz w TOP 10</span>
        <span style="color:var(--text2)">📊 ${rows.length} fraz łącznie (${days} dni)</span>
      </div>`;
    }

    // 3) PROGNOZA — liniowa regresja na trendzie sredniej pozycji -> projekcja TOP10 na 12 tyg.
    if (forecastEl) {
      const validPts = dateRows.map((r,i)=>({x:i, y:r.position})).filter(p=>!isNaN(p.y));
      let forecastLabels = [], forecastData = [];
      if (validPts.length >= 3) {
        const n = validPts.length;
        const sumX = validPts.reduce((a,p)=>a+p.x,0);
        const sumY = validPts.reduce((a,p)=>a+p.y,0);
        const sumXY = validPts.reduce((a,p)=>a+p.x*p.y,0);
        const sumXX = validPts.reduce((a,p)=>a+p.x*p.x,0);
        const slope = (n*sumXY - sumX*sumY) / (n*sumXX - sumX*sumX || 1);
        const intercept = (sumY - slope*sumX) / n;

        // szacuj % fraz w TOP10 dzis i ekstrapoluj proporcjonalnie do spadku sredniej pozycji
        const currentAvgPos = validPts[validPts.length-1].y;
        const top10Ratio = rows.length ? top10/rows.length : 0;

        for (let w=0; w<=12; w++) {
          const futureX = n - 1 + w*7; // co tydzien (~7 punktow dziennych dalej)
          const projectedPos = Math.max(1, slope*futureX + intercept);
          // im nizsza pozycja, tym wyzszy udzial w TOP10 (odwrotna proporcja, capped)
          const improvementFactor = currentAvgPos > 0 ? currentAvgPos / projectedPos : 1;
          const projectedRatio = Math.min(1, top10Ratio * improvementFactor);
          forecastLabels.push(w===0?'Teraz':`+${w}tyg`);
          forecastData.push(Math.round(projectedRatio * rows.length));
        }
      }

      if (forecastData.length) {
        forecastEl.innerHTML = `<canvas id="forecastCanvas-${site.id}" role="img" aria-label="Prognoza liczby fraz w TOP10 na 12 tygodni"></canvas>`;
        const fctx = document.getElementById(`forecastCanvas-${site.id}`);
        if (forecastChartInstance) forecastChartInstance.destroy();
        forecastChartInstance = new Chart(fctx, {
          type:'bar',
          data:{ labels: forecastLabels, datasets:[{ label:'Frazy w TOP 10', data: forecastData, backgroundColor:'#6c63ff', borderRadius:4, maxBarThickness:20 }] },
          options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ title:{display:true,text:'Liczba fraz'} } } }
        });
      } else {
        forecastEl.innerHTML = '<div class="empty">Za mało danych historycznych do prognozy (potrzeba min. 3 dni)</div>';
      }
    }

    // Render full table
    el.innerHTML = `
      <table class="seo-table">
        <thead><tr><th>Fraza</th><th>Pozycja</th><th>Kliknięcia</th><th>Wyświetlenia</th><th>CTR</th></tr></thead>
        <tbody>${rows.map(r=>{
          const pos = r.position;
          const posColor = pos<=3?'var(--green)':pos<=10?'var(--yellow)':'var(--text2)';
          return `<tr>
            <td style="font-size:12px">${r.keys[0]}</td>
            <td><span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${posColor}">#${pos.toFixed(1)}</span></td>
            <td style="font-size:12px">${r.clicks}</td>
            <td style="font-size:12px">${r.impressions}</td>
            <td style="font-size:12px">${(r.ctr*100).toFixed(1)}%</td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
  } catch(e) {
    el.innerHTML = `<div class="empty">Błąd: ${e.message}</div>`;
  }
}

// ── AI VISIBILITY (z ai_visibility_log.json w repo) ──
async function loadAiVisibility(site) {
  const el = document.getElementById(`ai-visibility-${site.id}`);
  if (!el) return;
  el.innerHTML = '<div class="loading"><div class="spinner"></div><span>Pobieranie danych...</span></div>';

  try {
    const res = await fetch(`https://raw.githubusercontent.com/Krystian-Webs/automatyzacje-wpisy-/main/dw-seo-autoposter/ai_visibility_log.json?t=${Date.now()}`);
    if (!res.ok) {
      el.innerHTML = '<div class="empty">Brak danych — workflow jeszcze się nie wykonał (czekamy na poniedziałek 9:00)</div>';
      document.getElementById(`m-ai-${site.id}`).textContent = '—';
      return;
    }
    const history = await res.json();
    if (!history.length) { el.innerHTML = '<div class="empty">Brak danych</div>'; return; }

    const latest = history[history.length-1];
    const checks = latest.checks || [];

    let mentioned = 0, total = 0;
    const tierGroups = {};
    checks.forEach(c=>{
      ['chatgpt','gemini'].forEach(plat=>{
        if (c[plat] && !c[plat].error) {
          total++;
          if (c[plat].mentioned) mentioned++;
        }
      });
      const tier = c.tier || 'inne';
      tierGroups[tier] = tierGroups[tier] || {mentioned:0, total:0};
      ['chatgpt','gemini'].forEach(plat=>{
        if (c[plat] && !c[plat].error) {
          tierGroups[tier].total++;
          if (c[plat].mentioned) tierGroups[tier].mentioned++;
        }
      });
    });

    document.getElementById(`m-ai-${site.id}`).textContent = `${mentioned}/${total}`;

    const tierLabels = {lokalnie:'📍 Lokalnie (Kotlina Kłodzka)', regionalnie:'🗺️ Regionalnie (Dolny Śląsk)', krajowo:'🇵🇱 Krajowo (Polska)', brand:'🏷️ Brand'};
    const tierHtml = Object.entries(tierGroups).map(([tier,v])=>{
      const pct = v.total ? Math.round(v.mentioned/v.total*100) : 0;
      const color = pct>=50?'var(--green)':pct>0?'var(--yellow)':'var(--text2)';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px">${tierLabels[tier]||tier}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${color}">${v.mentioned}/${v.total}</span>
      </div>`;
    }).join('');

    const sa = latest.site_analysis;
    let analysisHtml = '';
    if (sa && !sa.error) {
      const scoreColor = sa.score>=70?'var(--green)':sa.score>=40?'var(--yellow)':'var(--red)';
      analysisHtml = `
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
            <div style="font-size:28px;font-weight:700;color:${scoreColor};font-family:'JetBrains Mono',monospace">${sa.score}</div>
            <div style="font-size:12px;color:var(--text2)">Score widoczności lokalnej (AI)</div>
          </div>
          ${(sa.strengths||[]).map(s=>`<div style="font-size:12px;color:var(--green)">✓ ${s}</div>`).join('')}
          ${(sa.improvements||[]).map(s=>`<div style="font-size:12px;color:var(--yellow)">→ ${s}</div>`).join('')}
        </div>`;
    }

    el.innerHTML = `
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Ostatni pomiar: ${latest.date} · historia: ${history.length} pomiar(ów)</div>
      ${tierHtml}
      ${analysisHtml}
    `;
  } catch(e) {
    el.innerHTML = `<div class="empty">Błąd: ${e.message}</div>`;
  }
}

function switchTab(name, el) {
  activeTab = name;
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  if (el) el.classList.add('active');
  const panel = document.getElementById('tab-'+name);
  if (panel) panel.classList.add('active');
  if (window.innerWidth <= 860) toggleSidebar(false);
}

// ── SETTINGS ───────────────────────────────────────
function saveSettings(siteId) {
  const site = sites.find(s=>s.id===siteId);
  if (!site) return;
  site.name = document.getElementById('s-name').value;
  site.url = document.getElementById('s-url').value;
  site.gscSite = document.getElementById('s-gsc').value;
  site.wpUrl = document.getElementById('s-wp-url').value;
  site.wpUser = document.getElementById('s-wp-user').value;
  site.wpPass = document.getElementById('s-wp-pass').value;
  localStorage.setItem('dw_sites2', JSON.stringify(sites));
  activeSite = site;
  renderSidebar();
  document.getElementById(`settings-msg-${siteId}`).innerHTML = '<span style="color:var(--green)">✅ Zapisano!</span>';
  if (site.wpUser && site.wpPass) { loadWpData(site); loadSeoStatus(site); }
}

async function testWp(siteId) {
  const site = sites.find(s=>s.id===siteId);
  const msg = document.getElementById(`settings-msg-${siteId}`);
  msg.innerHTML = '<span style="color:var(--text2)">Testuję...</span>';
  try {
    const auth = btoa(`${site.wpUser}:${site.wpPass}`);
    const res = await fetch(`${site.wpUrl}/wp-json/wp/v2/users/me`,{headers:{'Authorization':`Basic ${auth}`}});
    if (res.ok) {
      const u = await res.json();
      msg.innerHTML = `<span style="color:var(--green)">✅ Połączono jako: ${u.name}</span>`;
    } else {
      msg.innerHTML = `<span style="color:var(--red)">❌ Błąd ${res.status}</span>`;
    }
  } catch(e) {
    msg.innerHTML = `<span style="color:var(--red)">❌ Nie można połączyć</span>`;
  }
}

function deleteSite(siteId) {
  if (!confirm('Usunąć stronę?')) return;
  sites = sites.filter(s=>s.id!==siteId);
  localStorage.setItem('dw_sites2', JSON.stringify(sites));
  activeSite = null;
  document.getElementById('topbar-right').style.display = 'none';
  document.getElementById('topbar-title').textContent = 'SEO Dashboard';
  document.getElementById('topbar-url').textContent = '';
  document.getElementById('content').innerHTML = '<div class="welcome"><div style="font-size:48px">🚀</div><h2>Wybierz stronę</h2></div>';
  renderSidebar();
}

// ── MODAL ──────────────────────────────────────────
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function saveSite() {
  const name = document.getElementById('f-name').value.trim();
  const url = document.getElementById('f-url').value.trim();
  if (!name||!url) { alert('Wypełnij nazwę i URL'); return; }
  const id = name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const gscSite = document.getElementById('f-gsc').value || `sc-domain:${new URL(url).hostname}`;
  sites.push({id,name,url,gscSite,wpUrl:url,wpUser:document.getElementById('f-wp-user').value,wpPass:document.getElementById('f-wp-pass').value});
  localStorage.setItem('dw_sites2', JSON.stringify(sites));
  closeModal();
  renderSidebar();
  selectSite(sites[sites.length-1]);
  ['f-name','f-url','f-gsc','f-wp-user','f-wp-pass'].forEach(i=>document.getElementById(i).value='');
}

async function checkPageSpeed() {
  const url = document.getElementById('ps-url').value.trim();
  const resEl = document.getElementById('ps-result');
  if (!url) return;
  resEl.innerHTML = '<div class="loading"><div class="spinner"></div><span>Analiza strony (może potrwać do 30s)...</span></div>';
  try {
    const res = await fetch(`https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(url)}&strategy=mobile&category=performance&category=seo`);
    if (!res.ok) throw new Error('PageSpeed API error');
    const data = await res.json();
    const lh = data.lighthouseResult;
    const perf = Math.round(lh.categories.performance.score * 100);
    const seo = Math.round((lh.categories.seo?.score||0) * 100);
    const lcp = lh.audits['largest-contentful-paint']?.displayValue || '—';
    const fcp = lh.audits['first-contentful-paint']?.displayValue || '—';
    const cls = lh.audits['cumulative-layout-shift']?.displayValue || '—';
    const color = v=> v>=90?'var(--green)':v>=50?'var(--yellow)':'var(--red)';

    resEl.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
        <div class="stat-card"><div class="stat-label">Performance (mobile)</div><div class="stat-value" style="color:${color(perf)}">${perf}</div></div>
        <div class="stat-card"><div class="stat-label">SEO</div><div class="stat-value" style="color:${color(seo)}">${seo}</div></div>
        <div class="stat-card"><div class="stat-label">LCP</div><div class="stat-value" style="font-size:18px">${lcp}</div></div>
        <div class="stat-card"><div class="stat-label">CLS</div><div class="stat-value" style="font-size:18px">${cls}</div></div>
      </div>`;
  } catch(e) {
    resEl.innerHTML = `<div class="empty">Błąd: ${e.message}. Sprawdź czy URL jest poprawny i publicznie dostępny.</div>`;
  }
}

// ── INIT ───────────────────────────────────────────
function toggleSidebar(force) {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  const open = force !== undefined ? force : !sb.classList.contains('open');
  sb.classList.toggle('open', open);
  ov.classList.toggle('open', open);
}
renderSidebar();
// Wstepnie odswiez tokeny GSC dla stron ktore byly juz polaczone — by przy wyborze strony dane byly gotowe od razu
sites.forEach(site => {
  if (!getToken(site.id) && localStorage.getItem(`gsc_connected_${site.id}`) === '1') {
    silentReconnectGSC(site);
  }
});
