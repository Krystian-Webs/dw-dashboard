<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DirectWebs — SEO Dashboard</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;
    --accent:#6c63ff;--accent2:#00d4aa;--text:#e8e8f0;--text2:#8888aa;
    --text3:#55556a;--red:#ff4d6a;--yellow:#ffd166;--green:#06d6a0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
  .sidebar{width:72px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:8px;position:fixed;top:0;left:0;bottom:0;z-index:100}
  .sidebar-logo{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;margin-bottom:16px}
  .site-icon{width:44px;height:44px;border-radius:12px;background:var(--surface2);border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;position:relative}
  .site-icon:hover{border-color:var(--accent)}
  .site-icon.active{border-color:var(--accent);background:rgba(108,99,255,.15)}
  .site-icon .tooltip{position:absolute;left:56px;background:var(--surface2);border:1px solid var(--border);padding:6px 10px;border-radius:8px;font-size:12px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:200}
  .site-icon:hover .tooltip{opacity:1}
  .sidebar-add{width:44px;height:44px;border-radius:12px;border:2px dashed var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text3);transition:all .2s;margin-top:auto}
  .sidebar-add:hover{border-color:var(--accent);color:var(--accent)}
  .main{margin-left:72px;flex:1;display:flex;flex-direction:column;min-height:100vh}
  .topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;position:sticky;top:0;z-index:50}
  .topbar-title{font-size:15px;font-weight:600}
  .topbar-url{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2)}
  .topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
  .btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
  .btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
  .btn-ghost:hover{color:var(--text);border-color:var(--accent)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#7c74ff}
  .btn-green{background:rgba(6,214,160,.15);color:var(--green);border:1px solid rgba(6,214,160,.3)}
  .btn-green:hover{background:rgba(6,214,160,.25)}
  .content{padding:28px;flex:1}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px}
  .tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab-panel{display:none}
  .tab-panel.active{display:block}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
  .stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
  .stat-value{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace}
  .stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
  .card-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
  .kw-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
  .kw-row:last-child{border-bottom:none}
  .kw-phrase{font-size:12px;flex:1}
  .kw-pos{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;width:32px;text-align:center}
  .kw-bar-wrap{width:80px;height:4px;background:var(--border);border-radius:2px}
  .kw-bar{height:4px;border-radius:2px;background:var(--accent)}
  .kw-clicks{font-size:11px;color:var(--text3);width:50px;text-align:right}
  .post-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
  .post-row:last-child{border-bottom:none}
  .post-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .post-info{flex:1}
  .post-title{font-size:12px}
  .post-meta{font-size:11px;color:var(--text3);margin-top:2px}
  .post-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(6,214,160,.12);color:var(--green);border:1px solid rgba(6,214,160,.25)}
  .badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
  .badge-purple{background:rgba(108,99,255,.15);color:var(--accent);border:1px solid rgba(108,99,255,.3)}
  .seo-table{width:100%;border-collapse:collapse}
  .seo-table th{text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:0 12px 10px 0;border-bottom:1px solid var(--border)}
  .seo-table td{padding:10px 12px 10px 0;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle}
  .seo-table tr:last-child td{border-bottom:none}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--text3);gap:12px}
  .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:32px;color:var(--text3);font-size:13px;line-height:1.6}
  .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 60px);gap:16px;color:var(--text2);text-align:center}
  .welcome h2{font-size:22px;color:var(--text)}
  .welcome p{font-size:14px;max-width:340px;line-height:1.6}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:480px;transform:translateY(10px);transition:transform .2s}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:20px}
  .form-group{margin-bottom:14px}
  .form-label{font-size:11px;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.06em}
  .form-input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
  .form-input:focus{border-color:var(--accent)}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
  .gsc-connected{color:var(--green);font-size:12px;display:flex;align-items:center;gap:6px}
  .gsc-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">DW</div>
  <button class="sidebar-add" onclick="openModal()">+</button>
</div>

<div class="main">
  <div class="topbar">
    <div id="topbar-title" style="font-size:15px;font-weight:600">SEO Dashboard</div>
    <div id="topbar-url" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2)"></div>
    <div class="topbar-right" id="topbar-right" style="display:none">
      <div id="gsc-status"></div>
      <button id="gsc-btn" class="btn btn-ghost" onclick="handleGscBtn()">🔗 Połącz GSC</button>
      <button class="btn btn-ghost" onclick="runSeoAudit()">🔍 Audyt SEO</button>
      <button class="btn btn-primary" onclick="generatePost()">✍️ Generuj wpis</button>
    </div>
  </div>
  <div class="content" id="content">
    <div class="welcome">
      <div style="font-size:48px">🚀</div>
      <h2>Wybierz stronę z panelu bocznego</h2>
      <p>Kliknij ikonę strony po lewej lub dodaj nową stronę przyciskiem +</p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">➕ Dodaj stronę</div>
    <div class="form-group"><label class="form-label">Nazwa strony</label><input class="form-input" id="f-name" placeholder="np. ABM Market"></div>
    <div class="form-group"><label class="form-label">URL strony</label><input class="form-input" id="f-url" placeholder="https://example.pl"></div>
    <div class="form-group"><label class="form-label">GSC Site URL (np. sc-domain:example.pl)</label><input class="form-input" id="f-gsc" placeholder="sc-domain:example.pl"></div>
    <div class="form-group"><label class="form-label">WordPress Login</label><input class="form-input" id="f-wp-user" placeholder="admin"></div>
    <div class="form-group"><label class="form-label">WordPress Application Password</label><input class="form-input" id="f-wp-pass" type="password" placeholder="xxxx xxxx xxxx xxxx"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Anuluj</button>
      <button class="btn btn-primary" onclick="saveSite()">Dodaj stronę</button>
    </div>
  </div>
</div>

<script>
const GSC_CLIENT_ID = '880754963463-fd93unrpgud1hmjm8n3q1d5de9uocdbn.apps.googleusercontent.com';
const GSC_SCOPE = 'https://www.googleapis.com/auth/webmasters.readonly';

// ── SITES ──────────────────────────────────────────
let sites = JSON.parse(localStorage.getItem('dw_sites2') || 'null') || [
  {id:'directwebs', name:'DirectWebs', url:'https://directwebs.pl', gscSite:'sc-domain:directwebs.pl', wpUrl:'https://directwebs.pl', wpUser:'', wpPass:''},
  {id:'abmmarket',  name:'ABM Market', url:'https://abmmarket.pl',  gscSite:'sc-domain:abmmarket.pl',  wpUrl:'https://abmmarket.pl',  wpUser:'', wpPass:''},
  {id:'wazakotlina',name:'Waża Kotlina',url:'https://wazakotlina.pl',gscSite:'sc-domain:wazakotlina.pl',wpUrl:'https://wazakotlina.pl',wpUser:'', wpPass:''},
];
let activeSite = null;

// ── GSC TOKEN per site ──────────────────────────────
function getToken(siteId) {
  const t = localStorage.getItem(`gsc_token_${siteId}`);
  const e = parseInt(localStorage.getItem(`gsc_expiry_${siteId}`) || '0');
  if (t && Date.now() < e) return t;
  return null;
}
function setToken(siteId, token, expiresIn) {
  localStorage.setItem(`gsc_token_${siteId}`, token);
  localStorage.setItem(`gsc_expiry_${siteId}`, Date.now() + expiresIn * 1000);
}
function clearToken(siteId) {
  localStorage.removeItem(`gsc_token_${siteId}`);
  localStorage.removeItem(`gsc_expiry_${siteId}`);
}

// ── RENDER SIDEBAR ─────────────────────────────────
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.querySelectorAll('.site-icon').forEach(e => e.remove());
  const addBtn = sidebar.querySelector('.sidebar-add');
  sites.forEach(site => {
    const el = document.createElement('div');
    el.className = 'site-icon' + (activeSite?.id === site.id ? ' active' : '');
    const domain = new URL(site.url).hostname;
    el.innerHTML = `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64" style="width:28px;height:28px;border-radius:6px;object-fit:cover"><span class="tooltip">${site.name}</span>`;
    el.onclick = () => selectSite(site);
    sidebar.insertBefore(el, addBtn);
  });
}

// ── SELECT SITE ────────────────────────────────────
function selectSite(site) {
  activeSite = site;
  renderSidebar();
  const domain = new URL(site.url).hostname;
  document.getElementById('topbar-title').innerHTML = `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=32" style="width:20px;height:20px;border-radius:4px;vertical-align:middle;margin-right:8px">${site.name}`;
  document.getElementById('topbar-url').textContent = site.url;
  document.getElementById('topbar-right').style.display = 'flex';
  updateGscStatus(site);
  renderProfile(site);
  if (site.wpUser && site.wpPass) { loadWpData(site); loadSeoStatus(site); }
  const token = getToken(site.id);
  if (token) loadGscData(site, token);
}

// ── GSC STATUS ─────────────────────────────────────
function updateGscStatus(site) {
  const token = getToken(site.id);
  const statusEl = document.getElementById('gsc-status');
  const btnEl = document.getElementById('gsc-btn');
  if (token) {
    statusEl.innerHTML = '<span class="gsc-connected"><span class="gsc-dot"></span>GSC połączone</span>';
    btnEl.textContent = '🔓 Rozłącz GSC';
    btnEl.className = 'btn btn-green';
  } else {
    statusEl.innerHTML = '';
    btnEl.textContent = '🔗 Połącz GSC';
    btnEl.className = 'btn btn-ghost';
  }
}

function handleGscBtn() {
  if (!activeSite) return;
  const token = getToken(activeSite.id);
  if (token) {
    clearToken(activeSite.id);
    updateGscStatus(activeSite);
    renderProfile(activeSite);
  } else {
    loginGSC(activeSite);
  }
}

function loginGSC(site) {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GSC_CLIENT_ID,
    scope: GSC_SCOPE,
    callback: (resp) => {
      if (resp.access_token) {
        setToken(site.id, resp.access_token, resp.expires_in || 3600);
        updateGscStatus(site);
        loadGscData(site, resp.access_token);
      }
    }
  });
  client.requestAccessToken();
}

// ── LOAD GSC DATA ──────────────────────────────────
async function loadGscData(site, token) {
  const end = new Date().toISOString().split('T')[0];
  const start = new Date(Date.now()-30*24*60*60*1000).toISOString().split('T')[0];
  try {
    const res = await fetch(`https://searchconsole.googleapis.com/webmasters/v3/sites/${encodeURIComponent(site.gscSite)}/searchAnalytics/query`, {
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({startDate:start,endDate:end,dimensions:['query'],rowLimit:20})
    });
    if (!res.ok) { clearToken(site.id); updateGscStatus(site); return; }
    const data = await res.json();
    const rows = data.rows || [];
    let clicks=0, impr=0, posSum=0;
    rows.forEach(r=>{clicks+=r.clicks;impr+=r.impressions;posSum+=r.position});
    const avgPos = rows.length ? (posSum/rows.length).toFixed(1) : '—';
    // update cards
    const cards = document.querySelectorAll('.stat-card .stat-value');
    if(cards[0]) cards[0].textContent = clicks.toLocaleString('pl-PL');
    if(cards[1]) cards[1].textContent = impr.toLocaleString('pl-PL');
    if(cards[2]) cards[2].textContent = avgPos;
    // update keywords panel
    renderKeywordsData(site, rows);

    if (site.id === 'directwebs') loadFullRanking(site, token);
  } catch(e) { console.error(e); }
}

// ── FULL RANKING (DirectWebs only) ─────────────────
async function loadFullRanking(site, token) {
  const el = document.getElementById(`ranking-full-${site.id}`);
  if (!el) return;
  const end = new Date().toISOString().split('T')[0];
  const start = new Date(Date.now()-90*24*60*60*1000).toISOString().split('T')[0];
  try {
    const res = await fetch(`https://searchconsole.googleapis.com/webmasters/v3/sites/${encodeURIComponent(site.gscSite)}/searchAnalytics/query`, {
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({startDate:start,endDate:end,dimensions:['query'],rowLimit:250})
    });
    if (!res.ok) { el.innerHTML = '<div class="empty">Błąd pobierania danych GSC</div>'; return; }
    const data = await res.json();
    let rows = data.rows || [];
    rows.sort((a,b)=>a.position-b.position);

    const top10 = rows.filter(r=>r.position<=10).length;
    const top3  = rows.filter(r=>r.position<=3).length;

    el.innerHTML = `
      <div style="display:flex;gap:16px;margin-bottom:16px;font-size:12px">
        <span style="color:var(--green)">🥇 ${top3} w TOP 3</span>
        <span style="color:var(--yellow)">⭐ ${top10} w TOP 10</span>
        <span style="color:var(--text2)">📊 ${rows.length} fraz (90 dni)</span>
      </div>
      <table class="seo-table">
        <thead><tr><th>Fraza</th><th>Pozycja</th><th>Kliknięcia</th><th>Wyświetlenia</th><th>CTR</th></tr></thead>
        <tbody>${rows.map(r=>{
          const pos = r.position;
          const posColor = pos<=3?'var(--green)':pos<=10?'var(--yellow)':'var(--text2)';
          return `<tr>
            <td style="font-size:12px">${r.keys[0]}</td>
            <td><span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${posColor}">#${pos.toFixed(1)}</span></td>
            <td style="font-size:12px">${r.clicks}</td>
            <td style="font-size:12px">${r.impressions}</td>
            <td style="font-size:12px">${(r.ctr*100).toFixed(1)}%</td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
  } catch(e) {
    el.innerHTML = `<div class="empty">Błąd: ${e.message}</div>`;
  }
}

function renderKeywordsData(site, rows) {
  const el = document.getElementById(`kw-${site.id}`);
  if (!el || !rows.length) return;
  const max = Math.max(...rows.map(r=>r.clicks))||1;
  el.innerHTML = rows.slice(0,10).map(r=>`
    <div class="kw-row">
      <div class="kw-phrase">${r.keys[0]}</div>
      <div class="kw-pos" style="color:${r.position<=5?'var(--green)':r.position<=10?'var(--yellow)':'var(--text2)'}">#${Math.round(r.position)}</div>
      <div class="kw-bar-wrap"><div class="kw-bar" style="width:${r.clicks/max*100}%"></div></div>
      <div class="kw-clicks">${r.clicks} klik.</div>
    </div>`).join('');

  // update top kw in overview
  const topEl = document.getElementById(`top-kw-${site.id}`);
  if(topEl) topEl.innerHTML = rows.slice(0,5).map(r=>`
    <div class="kw-row">
      <div class="kw-phrase">${r.keys[0]}</div>
      <div class="kw-pos" style="color:${r.position<=5?'var(--green)':r.position<=10?'var(--yellow)':'var(--text2)'}">#${Math.round(r.position)}</div>
      <div class="kw-bar-wrap"><div class="kw-bar" style="width:${r.clicks/max*100}%"></div></div>
      <div class="kw-clicks">${r.clicks} klik.</div>
    </div>`).join('');
}

// ── LOAD WP DATA ───────────────────────────────────
async function loadWpData(site) {
  const auth = btoa(`${site.wpUser}:${site.wpPass}`);
  try {
    const res = await fetch(`${site.wpUrl}/wp-json/wp/v2/posts?per_page=20&status=publish&_fields=id,title,link,date`,
      {headers:{'Authorization':`Basic ${auth}`}});
    if (!res.ok) return;
    const posts = await res.json();
    // update count
    const cards = document.querySelectorAll('.stat-card .stat-value');
    if(cards[3]) cards[3].textContent = posts.length;
    renderPostsData(site, posts);
  } catch(e){}

  try {
    const res = await fetch(`${site.wpUrl}/wp-json/wp/v2/pages?per_page=50&status=publish&_fields=id,title,link,slug`,
      {headers:{'Authorization':`Basic ${auth}`}});
    if (!res.ok) return;
    const pages = await res.json();
    renderPagesData(site, pages);
  } catch(e){}
}

function renderPostsData(site, posts) {
  ['recent-posts-'+site.id, 'all-posts-'+site.id].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const limit = id.startsWith('recent') ? 5 : 999;
    el.innerHTML = posts.slice(0,limit).map(p=>`
      <div class="post-row">
        <div class="post-dot"></div>
        <div class="post-info">
          <div class="post-title">${p.title.rendered}</div>
          <div class="post-meta">${new Date(p.date).toLocaleDateString('pl-PL')} · <a href="${p.link}" target="_blank" style="color:var(--accent);text-decoration:none">Zobacz →</a></div>
        </div>
        <span class="post-badge">opublikowany</span>
      </div>`).join('') || '<div class="empty">Brak wpisów</div>';
  });
}

function renderPagesData(site, pages) {
  const el = document.getElementById('seo-pages-'+site.id);
  if (!el) return;
  el.innerHTML = `<table class="seo-table">
    <thead><tr><th>Ścieżka</th><th>Tytuł</th><th>Score</th><th></th></tr></thead>
    <tbody>${pages.map(p=>{
      const score=Math.floor(Math.random()*25)+70;
      const cls=score>=80?'color:var(--green)':score>=65?'color:var(--yellow)':'color:var(--red)';
      const path=p.link.replace(site.url,'')||'/';
      return `<tr>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2)">${path}</td>
        <td style="font-size:12px">${p.title.rendered}</td>
        <td><span style="font-family:'JetBrains Mono',monospace;font-weight:700;${cls}">${score}</span></td>
        <td><button class="btn btn-ghost" style="font-size:10px;padding:3px 8px">Analizuj</button></td>
      </tr>`;}).join('')}</tbody>
  </table>`;
}

// ── LOAD SEO STATUS from plugin ───────────────────
async function loadSeoStatus(site) {
  const el = document.getElementById('seo-pages-'+site.id);
  if (!el || !site.wpUser) return;

  el.innerHTML = '<div class="loading"><div class="spinner"></div><span>Pobieranie statusu SEO...</span></div>';

  const auth = btoa(`${site.wpUser}:${site.wpPass}`);
  try {
    // First check plugin info
    const infoRes = await fetch(`${site.wpUrl}/wp-json/directwebs/v1/info?token=directwebs2026`, {
      headers: {'Authorization': `Basic ${auth}`}
    });

    let pluginInfo = null;
    if (infoRes.ok) {
      pluginInfo = await infoRes.json();
    }

    // Get SEO status
    const res = await fetch(`${site.wpUrl}/wp-json/directwebs/v1/seo-status?token=directwebs2026&type=all&limit=100`, {
      headers: {'Authorization': `Basic ${auth}`}
    });

    if (!res.ok) {
      el.innerHTML = '<div class="empty">Plugin DirectWebs SEO nie jest zainstalowany.<br><span style="font-size:11px;color:var(--text3)">Wgraj plugin directwebs-seo.php przez WP Admin → Wtyczki</span></div>';
      return;
    }

    const data = await res.json();
    const items = data.items || [];

    // Update SEO score card
    const scoreEl = document.querySelector('.stat-card:last-child .stat-value');

    // Group by type
    const posts    = items.filter(i => i.type === 'post');
    const pages    = items.filter(i => i.type === 'page');
    const products = items.filter(i => i.type === 'product');

    const pluginBadge = pluginInfo ? `<span class="badge badge-purple">${pluginInfo.seo_plugin === 'none' ? 'Brak wtyczki SEO' : pluginInfo.seo_plugin}</span>` : '';
    const wcBadge = pluginInfo?.woocommerce ? '<span class="badge" style="background:rgba(0,212,170,.12);color:var(--accent2);border:1px solid rgba(0,212,170,.3)">WooCommerce</span>' : '';

    const avgScore = data.avg_score || 0;
    const scoreColor = avgScore >= 70 ? 'var(--green)' : avgScore >= 50 ? 'var(--yellow)' : 'var(--red)';

    const renderSection = (title, sectionItems, type) => {
      if (!sectionItems.length) return '';
      return `
        <div style="margin-bottom:24px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:8px">
            ${title} <span style="color:var(--text2)">(${sectionItems.length})</span>
          </div>
          <table class="seo-table">
            <thead><tr>
              <th style="width:30%">Tytuł</th>
              <th>Tytuł SEO</th>
              <th>Meta opis</th>
              <th style="width:60px">Score</th>
              <th style="width:50px">Słowa</th>
            </tr></thead>
            <tbody>${sectionItems.map(item => {
              const sc = item.score;
              const scColor = sc>=70?'var(--green)':sc>=50?'var(--yellow)':'var(--red)';
              return `<tr>
                <td><a href="${item.url}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:12px">${item.title.substring(0,40)}${item.title.length>40?'...':''}</a></td>
                <td style="font-size:11px;color:${item.seo_title?'var(--text)':'var(--red)'}">${item.seo_title?item.seo_title.substring(0,35)+'...':'⚠️ Brak'}</td>
                <td style="font-size:11px;color:${item.seo_desc?'var(--text2)':'var(--red)'}">${item.seo_desc?item.seo_desc.substring(0,45)+'...':'⚠️ Brak'}</td>
                <td><span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:${scColor}">${sc}</span></td>
                <td style="font-size:11px;color:var(--text3)">${item.word_count}</td>
              </tr>`;
            }).join('')}</tbody>
          </table>
        </div>`;
    };

    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)">
        <div style="font-size:32px;font-weight:700;color:${scoreColor};font-family:'JetBrains Mono',monospace">${avgScore}</div>
        <div>
          <div style="font-size:12px;color:var(--text2)">Średni SEO Score</div>
          <div style="display:flex;gap:6px;margin-top:4px">${pluginBadge}${wcBadge}</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:16px;font-size:12px">
          <span style="color:var(--green)">✅ ${data.good} dobrych</span>
          <span style="color:var(--red)">❌ ${data.bad} słabych</span>
          <span style="color:var(--text2)">📄 ${data.total} łącznie</span>
        </div>
      </div>
      ${renderSection('📝 Wpisy blogowe', posts, 'post')}
      ${renderSection('📄 Strony', pages, 'page')}
      ${renderSection('🛒 Produkty', products, 'product')}
    `;

  } catch(e) {
    el.innerHTML = `<div class="empty">Błąd połączenia: ${e.message}</div>`;
  }
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ── SETTINGS ───────────────────────────────────────
function saveSettings(siteId) {
  const site = sites.find(s=>s.id===siteId);
  if (!site) return;
  site.name = document.getElementById('s-name').value;
  site.url = document.getElementById('s-url').value;
  site.gscSite = document.getElementById('s-gsc').value;
  site.wpUrl = document.getElementById('s-wp-url').value;
  site.wpUser = document.getElementById('s-wp-user').value;
  site.wpPass = document.getElementById('s-wp-pass').value;
  localStorage.setItem('dw_sites2', JSON.stringify(sites));
  activeSite = site;
  renderSidebar();
  document.getElementById(`settings-msg-${siteId}`).innerHTML = '<span style="color:var(--green)">✅ Zapisano!</span>';
  if (site.wpUser && site.wpPass) { loadWpData(site); loadSeoStatus(site); }
}

async function testWp(siteId) {
  const site = sites.find(s=>s.id===siteId);
  const msg = document.getElementById(`settings-msg-${siteId}`);
  msg.innerHTML = '<span style="color:var(--text2)">Testuję...</span>';
  try {
    const auth = btoa(`${site.wpUser}:${site.wpPass}`);
    const res = await fetch(`${site.wpUrl}/wp-json/wp/v2/users/me`,{headers:{'Authorization':`Basic ${auth}`}});
    if (res.ok) {
      const u = await res.json();
      msg.innerHTML = `<span style="color:var(--green)">✅ Połączono jako: ${u.name}</span>`;
    } else {
      msg.innerHTML = `<span style="color:var(--red)">❌ Błąd ${res.status}</span>`;
    }
  } catch(e) {
    msg.innerHTML = `<span style="color:var(--red)">❌ Nie można połączyć</span>`;
  }
}

function deleteSite(siteId) {
  if (!confirm('Usunąć stronę?')) return;
  sites = sites.filter(s=>s.id!==siteId);
  localStorage.setItem('dw_sites2', JSON.stringify(sites));
  activeSite = null;
  document.getElementById('topbar-right').style.display = 'none';
  document.getElementById('topbar-title').textContent = 'SEO Dashboard';
  document.getElementById('topbar-url').textContent = '';
  document.getElementById('content').innerHTML = '<div class="welcome"><div style="font-size:48px">🚀</div><h2>Wybierz stronę</h2></div>';
  renderSidebar();
}

// ── MODAL ──────────────────────────────────────────
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function saveSite() {
  const name = document.getElementById('f-name').value.trim();
  const url = document.getElementById('f-url').value.trim();
  if (!name||!url) { alert('Wypełnij nazwę i URL'); return; }
  const id = name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const gscSite = document.getElementById('f-gsc').value || `sc-domain:${new URL(url).hostname}`;
  sites.push({id,name,url,gscSite,wpUrl:url,wpUser:document.getElementById('f-wp-user').value,wpPass:document.getElementById('f-wp-pass').value});
  localStorage.setItem('dw_sites2', JSON.stringify(sites));
  closeModal();
  renderSidebar();
  selectSite(sites[sites.length-1]);
  ['f-name','f-url','f-gsc','f-wp-user','f-wp-pass'].forEach(i=>document.getElementById(i).value='');
}

function generatePost() { window.open('https://github.com/automatyzacje-wpisy-/dw-seo-autoposter/actions','_blank'); }
